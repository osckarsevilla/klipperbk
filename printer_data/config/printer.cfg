[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_0220001125813AAFFCCC6B5CC12000F5-if00
baud: 250000
restart_method: command


[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]





[display]
lcd_type: st7920
cs_pin: P1.23
sclk_pin: P1.21
sid_pin: P1.19
encoder_pins: ^P3.25, ^P3.26
click_pin: ^!P1.30

[pause_resume]


[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100





#widcard includes




[include macros/*.cfg]
# [include timelapse.cfg]
# [include macros.cfg]
[include mainsail.cfg]

[include shell_command.cfg]

[include autotune_tmc.cfg]

[exclude_object]




[include KAMP_Settings.cfg]


#####################################################################
# Motores
#####################################################################
[force_move]
enable_force_move: True

[heater_fan hotend_fan]
pin: P2.4        # comprueba el pin correcto de tu SKR 1.3
heater: extruder
heater_temp: 50.0


[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: !P1.29
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: P0.19
dir_pin: P0.20             # Dirección lógica (hacia atrás es lejos de ti)
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: ^!P1.28        # El símbolo ^ es fundamental para que el sensor funcione
position_endstop: 220
position_min: -15
position_max: 220          # Reducimos el área para evitar el choque al fondo
homing_speed: 10           # Velocidad lenta para que el sensor tenga tiempo de reaccionar
homing_retract_dist: 5   # Aumentamos a 10mm para asegurar que se libere
homing_positive_dir: true  # home hacia Y positivo (atrás)

[stepper_z]
step_pin: P0.22
dir_pin: P2.11      # ← quitamos el ! para invertir la dirección
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 250
homing_speed: 10
second_homing_speed: 3
homing_positive_dir: false
homing_retract_dist: 5




[stepper_z1]
step_pin: P1.15
dir_pin: P1.14      # ← quitamos el ! 
enable_pin: !P1.16
microsteps: 16
rotation_distance: 8






[screws_tilt_adjust]
screw1: 72, 179       # tornillo frontal izquierdo (offset CR Touch)
screw1_name: frontal izquierdo
screw2: 234, 179       # tornillo frontal derecho
screw2_name: frontal derecho
screw3: 234, 9      # tornillo trasero derecho
screw3_name: trasero derecho
screw4: 72, 9       # tornillo trasero izquierdo
screw4_name: trasero izquierdo
horizontal_move_z: 10
speed: 50
screw_thread: CW-M4   # tornillos Ender 3 son M4 sentido horario



#####################################################################
# Extrusor
#####################################################################

[extruder]
step_pin: P2.13
dir_pin: P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 7.710
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24
min_temp: 0
max_temp: 280
min_extrude_temp: 170
pressure_advance: 0.258
max_extrude_only_distance: 200.0
max_extrude_cross_section: 5





control = pid
pid_kp = 29.581
pid_ki = 2.348
pid_kd = 93.179
####################################################################
# Cama caliente
#####################################################################

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
min_temp: 0
max_temp: 130
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182

[fan]
pin: P2.3

#####################################################################
# CR Touch / BLTouch
#####################################################################

[bltouch]
sensor_pin: ^P0.10
control_pin: P2.0
x_offset: -44
y_offset: -14
z_offset: 1.347 
speed: 3
samples: 3
sample_retract_dist: 3.0
lift_speed: 10
samples_result: median
samples_tolerance: 0.15             # Un poco más de margen para evitar abortos
samples_tolerance_retries: 3
pin_up_touch_mode_reports_triggered: True
stow_on_each_sample: True
pin_up_reports_not_triggered: True
probe_with_touch_mode: True


[safe_z_home]
home_xy_position: 154, 124    
speed: 100
z_hop: 10
z_hop_speed: 20




#####################################################################
# Z Tilt (Nivelación de doble motor Z)
#####################################################################

[z_tilt]
z_positions:
    -35, 117    # Posición física del husillo izquierdo
    270, 117    # Posición física del husillo derecho
points:
    60, 117     # Punto de sondeo izquierdo (seguro para el offset de -44)
    220, 117    # Punto de sondeo derecho (seguro dentro de la cama)
speed: 100
horizontal_move_z: 10
retries: 20            # Margen de sobra para converger
retry_tolerance: 0.01  # Precisión realista y estable para una Ender 3


### Gemini

#####################################################################
# Bed Mesh
#####################################################################

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30, 30
mesh_max: 190, 190
probe_count: 7, 7      # ← cambia de 5,5 a 7,7
algorithm: bicubic
fade_start: 1
fade_end: 10
adaptive_margin: 5

##################
###### Bed screws
##################
[bed_screws]
screw1: 29, 179
screw1_name: tornillo frontal izquierdo
screw2: 201, 179
screw2_name: tornillo frontal derecho
screw3: 201, 11
screw3_name: tornillo trasero derecho
screw4: 19, 11
screw4_name: tornillo trasero izquierdo






#####################################################################
# TMC2209 UART
#####################################################################

[tmc2209 stepper_x]
uart_pin: P1.10
run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: P1.9
run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: P1.8
run_current: 0.650
# stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: P1.4
run_current: 0.800
# stealthchop_threshold: 999999

[tmc2209 stepper_z1]
uart_pin: P1.1
run_current: 0.650
# stealthchop_threshold: 999999







[gcode_macro Z_TILT_ADJUST_MACRO]
gcode:
    Z_TILT_ADJUST

[gcode_macro PID_EXTRUDER]
gcode:
    PID_CALIBRATE HEATER=extruder TARGET=200

[gcode_macro PID_BED]
gcode:
    PID_CALIBRATE HEATER=heater_bed TARGET=60

