##snapshoturl: http://127.0.0.1:8080/?action=snapshot
#frame_path: /tmp/timelapse/       # Frames temporales
parkhead: True                    # Aparca el cabezal para la foto
parkpos: back_left                # Posición: center, front_left, back_right...
park_retract_distance: 1.0        # Retracción antes de la foto (mm)
park_time: 0.5
autorender: True                  # Renderiza al terminar la impresión
#variable_fps: True                # FPS variable según duración
targetlength: 10                   # Duración objetivo del vídeo (segundos)
enabled: True
#constant_rate_factor: 23          # Calidad (0=lossless, 51=peor)
output_framerate: 30


[update_manager fluidd]
