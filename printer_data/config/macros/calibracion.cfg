[gcode_macro BED_LEVEL]
description: 📐 Calibración manual con papel (4 esquinas + centro)
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Calibrando cama...
    BED_SCREWS_ADJUST

[gcode_macro SCREWS_TILT]
description: 🔩 Medir desviación de tornillos y cuánto girar cada uno
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Midiendo inclinación...
    SCREWS_TILT_CALCULATE

[gcode_macro FULL_BED_LEVEL_PRO]
description: 🔥 Precalentar + home + medir tornillos con BLTouch | Uso: FULL_BED_LEVEL_PRO BED=60 EXTRUDER=150
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(160)|float %}

    M117 Calentando para calibrar...
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}
    
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}

    G28

    M117 Midiendo tornillos (Cama:{BED_TEMP} - Hotend:{EXTRUDER_TEMP})
    SCREWS_TILT_CALCULATE

# Macro base que hace el movimiento
[gcode_macro _MOVER_PUNTO]
gcode:
    {% set X = params.X|default(117)|float %}
    {% set Y = params.Y|default(117)|float %}
    {% set NOMBRE = params.NOMBRE|default("Centro") %}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G90
    G1 Z10 F600
    G1 X{X} Y{Y} F3000
    M117 Punto: {NOMBRE}
    G1 Z0.2 F300

# Botones individuales que aparecerán en tu panel
[gcode_macro POS_CENTRO]
gcode: _MOVER_PUNTO X=117 Y=117 NOMBRE="Centro"

[gcode_macro POS_DELANTE_IZQ]
gcode: _MOVER_PUNTO X=30 Y=30 NOMBRE="Frontal Izq"

[gcode_macro POS_DELANTE_DER]
gcode: _MOVER_PUNTO X=190 Y=30 NOMBRE="Frontal Der"

[gcode_macro POS_DETRAS_IZQ]
gcode: _MOVER_PUNTO X=30 Y=205 NOMBRE="Trasera Izq"

[gcode_macro POS_DETRAS_DER]
gcode: _MOVER_PUNTO X=190 Y=205 NOMBRE="Trasera Der"










