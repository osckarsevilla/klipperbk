[gcode_macro MOVE_TO_CORNER]
description: 🎯 Mover a esquina | Uso: MOVE_TO_CORNER CORNER=FL/FR/BL/BR/CENTER
gcode:
    {% set CORNER = params.CORNER|default("CENTER")|upper %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G1 Z10 F600
    {% if CORNER == "FL" %}
        G1 X15 Y15 F3000
        M117 Esquina: Delante Izquierda
    {% elif CORNER == "FR" %}
        G1 X220 Y15 F3000
        M117 Esquina: Delante Derecha
    {% elif CORNER == "BL" %}
        G1 X15 Y205 F3000
        M117 Esquina: Detras Izquierda
    {% elif CORNER == "BR" %}
        G1 X220 Y205 F3000
        M117 Esquina: Detras Derecha
    {% elif CORNER == "CENTER" %}
        G1 X117 Y110 F3000
        M117 Centro de cama
    {% endif %}
    G1 Z0.2 F300



