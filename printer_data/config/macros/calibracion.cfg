[gcode_macro BED_LEVEL]
description: 📐 Calibración manual con papel (4 esquinas + centro)
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Calibrando cama...
    BED_SCREWS_ADJUST

[gcode_macro SCREWS_TILT]
description: 🔩 Medir desviación de tornillos y cuánto girar cada uno
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Midiendo inclinación...
    SCREWS_TILT_CALCULATE

[gcode_macro FULL_BED_LEVEL_PRO]
description: 🔥 Precalentar + home + medir tornillos con BLTouch | Uso: FULL_BED_LEVEL_PRO BED=60 EXTRUDER=150
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(160)|float %}

    M117 Calentando para calibrar...
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}
    
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}

    G28

    M117 Midiendo tornillos (Cama:{BED_TEMP} - Hotend:{EXTRUDER_TEMP})
    SCREWS_TILT_CALCULATE


