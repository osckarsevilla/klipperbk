#####################################################################
# ARCHIVO DE NIVELACIÓN INTEGRADO - ENDER 3 (SKR 1.3 + DOBLE Z)
#####################################################################

#--- MACRO BASE DE MOVIMIENTO ---#
[gcode_macro _MOVER_PUNTO]
gcode:
    {% set X = params.X|float %}
    {% set Y = params.Y|float %}
    {% set NOMBRE = params.NOMBRE %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G90
    G1 Z10 F600
    G1 X{X} Y{Y} F6000
    M117 Punto: {NOMBRE}
    G1 Z0.5 F600

#--- POSICIONES RÁPIDAS (Boquilla sobre cama) ---#
[gcode_macro POS_CENTRO]
gcode: _MOVER_PUNTO X=117 Y=117 NOMBRE="Centro"

[gcode_macro POS_DELANTE_IZQ]
gcode: _MOVER_PUNTO X=30 Y=30 NOMBRE="Delante Izq (Cama atras)"

[gcode_macro POS_DELANTE_DER]
gcode: _MOVER_PUNTO X=190 Y=30 NOMBRE="Delante Der (Cama atras)"

[gcode_macro POS_DETRAS_IZQ]
gcode: _MOVER_PUNTO X=30 Y=205 NOMBRE="Detras Izq (Cama adelante)"

[gcode_macro POS_DETRAS_DER]
gcode: _MOVER_PUNTO X=190 Y=205 NOMBRE="Detras Der (Cama adelante)"

#--- CALIBRACIÓN ASISTIDA (BLTOUCH) ---#
[gcode_macro NIVELAR_TORNILLOS_HOT]
description: 🔥 Calienta a 70C y mide tornillos (Incluye Home + Z-Tilt)
gcode:
    M117 Preparando cama (70C)...
    M106 S0
    M190 S70
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Alineando motores Z...
    Z_TILT_ADJUST
    G28 Z
    M117 Midiendo tornillos...
    SCREWS_TILT_CALCULATE

#--- CALIBRACIÓN MANUAL (PAPEL) ---#
[gcode_macro NIVELAR_PAPEL_HOT]
description: 📐 Calienta a 70C y lanza BED_SCREWS_ADJUST
gcode:
    M117 Preparando cama (70C)...
    M190 S70
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Nivelando con papel...
    BED_SCREWS_ADJUST

#--- MANTENIMIENTO COMPLETO ---#
[gcode_macro FULL_MAINTENANCE]
description: 🛠️ Proceso total: Home + Z-Tilt + Mesh + Tornillos (70C)
gcode:
    M117 Iniciando mantenimiento total...
    M190 S70
    G28
    M117 Ajustando motores Z...
    Z_TILT_ADJUST
    G28 Z
    M117 Creando malla de cama...
    BED_MESH_CALIBRATE
    M117 Calculando tornillos...
    SCREWS_TILT_CALCULATE
    M117 ¡Mantenimiento terminado! Revisa la consola.

#--- FINAL DE IMPRESIÓN ---#
[gcode_macro END_PRINT]
description: 🏁 Final de impresión: Apaga todo y presenta la cama
gcode:
    G91 ; Relativo
    G1 E-2 F2700 ; Retraer
    G1 Z10 F600 ; Subir
    G90 ; Absoluto
    M104 S0 ; Apagar hotend
    M140 S0 ; Apagar cama
    M106 S0 ; Apagar ventilador
    G1 X5 Y215 F3000 ; Presentar pieza
    M84 X Y E ; Liberar motores
    M117 Impresión lista.