[gcode_macro END_PRINT]
description: 🏁 Final de impresión: Apaga todo y presenta la cama
gcode:
    # 1. Retracción de seguridad
    G91 ; Posicionamiento relativo
    G1 E-2 F2700 ; Retrae 2mm de filamento
    G1 Z10 F600 ; Sube el cabezal 10mm para no rayar la pieza
    
    # 2. Apagar motores y calor
    G90 ; Posicionamiento absoluto
    M104 S0 ; Apagar hotend
    M140 S0 ; Apagar cama
    M106 S0 ; Apagar ventilador de capa
    
    # 3. Presentar pieza
    G1 X5 Y215 F3000 ; Mueve el carro X al lado y la cama hacia adelante
    
    # 4. Desactivar motores (opcional, para poder moverla a mano)
    M84 X Y E 
    M117 ¡Impresión terminada!




    #####################################################################
# ARCHIVO DE NIVELACIÓN PERSONALIZADO - ENDER 3 (SKR 1.3 + BLTOUCH)
#####################################################################

#--- MACRO BASE DE MOVIMIENTO ---#
[gcode_macro _MOVER_PUNTO]
gcode:
    {% set X = params.X|float %}
    {% set Y = params.Y|float %}
    {% set NOMBRE = params.NOMBRE %}
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    G90
    G1 Z10 F600
    G1 X{X} Y{Y} F6000
    M117 Punto: {NOMBRE}
    G1 Z0.5 F600

#--- POSICIONES RÁPIDAS ---#
[gcode_macro POS_CENTRO]
gcode: _MOVER_PUNTO X=117 Y=117 NOMBRE="Centro"

[gcode_macro POS_DELANTE_IZQ]
gcode: _MOVER_PUNTO X=30 Y=30 NOMBRE="Delante Izq (Cama atras)"

[gcode_macro POS_DELANTE_DER]
gcode: _MOVER_PUNTO X=190 Y=30 NOMBRE="Delante Der (Cama atras)"

[gcode_macro POS_DETRAS_IZQ]
gcode: _MOVER_PUNTO X=30 Y=205 NOMBRE="Detras Izq (Cama adelante)"

[gcode_macro POS_DETRAS_DER]
gcode: _MOVER_PUNTO X=190 Y=205 NOMBRE="Detras Der (Cama adelante)"

#--- CALIBRACIÓN ASISTIDA (BLTOUCH) ---#
[gcode_macro NIVELAR_TORNILLOS_HOT]
description: 🔥 Calienta a 70C y usa SCREWS_TILT_CALCULATE
gcode:
    M117 Calentando cama a 70C...
    M106 S0
    M190 S70
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    Z_TILT_ADJUST       # Nivelar motores Z independientes
    G28 Z               # Re-home Z tras ajuste
    M117 Midiendo tornillos...
    SCREWS_TILT_CALCULATE

#--- CALIBRACIÓN MANUAL (PAPEL) ---#
[gcode_macro NIVELAR_PAPEL_HOT]
description: 📐 Calienta a 70C y usa BED_SCREWS_ADJUST
gcode:
    M117 Calentando cama a 70C...
    M190 S70
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    M117 Use papel en cada punto...
    BED_SCREWS_ADJUST

#--- MANTENIMIENTO COMPLETO ---#
[gcode_macro FULL_MAINTENANCE]
description: 🛠️ Home + Z-Tilt + Mesh + Tornillos (70C)
gcode:
    M117 Iniciando mantenimiento total...
    M190 S70
    G28
    Z_TILT_ADJUST
    BED_MESH_CALIBRATE
    SCREWS_TILT_CALCULATE
    M117 Calibración terminada. REVISA LA CONSOLA.



[gcode_macro Z_TILT_ADJUST_AUTO]
description: ⚖️ Alinea los motores Z (hace Home si es necesario)
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        M117 Haciendo Home preventivo...
        G28
    {% endif %}
    M117 Nivelando motores Z...
    Z_TILT_ADJUST
    G28 Z # Re-hacer home de Z para asegurar precisión tras el ajuste
    M117 Eje X nivelado