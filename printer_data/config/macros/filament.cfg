[gcode_macro FILAMENT_CHANGE]
description: 🔄 Cambiar filamento | Calienta, pausa y retrae | Uso: FILAMENT_CHANGE TEMP=200
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    M117 Calentando extrusor...
    M104 S{TEMP}
    M109 S{TEMP}
    PAUSE
    G91
    G1 E5 F150
    G1 E-50 F300
    G92 E0
    G90
    M117 Saca el filamento y ejecuta LOAD_FILAMENT





[gcode_macro LOAD_FILAMENT]
description: ⬇️ Cargar filamento | Calienta, empuja y purga | Uso: LOAD_FILAMENT TEMP=200 PURGE=60
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    {% set PURGE = params.PURGE|default(60)|float %}
    {% if printer.extruder.temperature < printer.configfile.settings.extruder.min_extrude_temp %}
        M117 Calentando extrusor...
        M104 S{TEMP}
        M109 S{TEMP}
    {% endif %}
    M117 Cargando filamento...
    G91
    G1 E80 F300
    G1 E{PURGE} F150
    G92 E0
    G90
    M117 Listo - ejecuta RESUME



G1 E80 F200   # antes ponías, por ejemplo, E50
G1 E30 F150   # añade una segunda pasada lenta de purga


[gcode_macro UNLOAD_FILAMENT]
description: ⬆️ Retirar filamento | Calienta y retrae | Uso: UNLOAD_FILAMENT TEMP=200
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    {% if printer.extruder.temperature < printer.configfile.settings.extruder.min_extrude_temp %}
        M117 Calentando extrusor...
        M104 S{TEMP}
        M109 S{TEMP}
    {% endif %}
    M117 Retractando filamento...
    G91
    G1 E5 F150
    G1 E-50 F300
    G92 E0
    G90
    M117 Filamento retirado - ejecuta LOAD_FILAMENT
