#####################################################################
# Inicio y Fin de Impresión
#####################################################################

# En PrusaSlicer → Código G inicial pon:
# START_PRINT BED={first_layer_bed_temperature[0]} EXTRUDER={first_layer_temperature[0]}
#
# En PrusaSlicer → Código G final pon:
# PRINT_END

[gcode_macro START_PRINT]
description: 🚀 Inicio de impresión optimizado con Z-Tilt y Mesh
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    M117 Calentando...
    M140 S{BED_TEMP}            ; Iniciar calentamiento de cama
    M104 S150                   ; Precalentar extrusor a 150° (evita goteo)
    M190 S{BED_TEMP}            ; Esperar a que la cama llegue a temperatura
    M109 S150                   ; Asegurar que el extrusor esté a 150°

    M117 Homing y Nivelando...
    G28                         ; Home completo (X, Y, Z)
    # Configuración de Timelapse (si lo usas)
    _SET_TIMELAPSE_SETUP ENABLE=True PARK_ENABLE=True PARK_POS=custom CUSTOM_POS_X=117 CUSTOM_POS_Y=10 CUSTOM_POS_DZ=1 RETRACT_DISTANCE=2.0 EXTRUDE_DISTANCE=1.8 RETRACT_SPEED=40 EXTRUDE_SPEED=20
    
    Z_TILT_ADJUST               ; Nivelar el eje X (motores Z independientes)
    G28 Z                       ; RE-HOME Z: Vital después de ajustar el tilt
    
    M117 Creando malla...
    BED_MESH_CLEAR          ; Limpiar malla vieja
    BED_MESH_CALIBRATE      ; Generar malla de la cama
    
    M117 Temperatura final...
    G1 X0 Y0 Z10 F3000          ; Ir a esquina para calentar el resto sin quemar la cama
    M109 S{EXTRUDER_TEMP}       ; Esperar temperatura final de impresión

    M117 Purgando...
    PRIME_NOZZLE                ; Tu línea de purga personalizada
    M117 ¡A imprimir!

[gcode_macro PRINT_END]
description: 🏁 Fin de impresión | Apaga, retrae y aparca cabezal
gcode:
    M400                        ; esperar a que el buffer se vacíe
    G92 E0
    G1 E-5 F1800                ; retracción rápida para evitar gota
    G91
    G1 Z10 F3000                ; subir Z 10mm
    G90
    G1 X10 Y220 F4000           ; aparcar en esquina delantera izquierda (acceso fácil a la pieza)
    
    TIMELAPSE_RENDER              ; <--- Renderiza el vídeo al terminar
    
    # --- GUARDADO AUTOMÁTICO ---
    Z_OFFSET_APPLY_PROBE          ; Convierte el ajuste temporal en permanente
    M140 S0                     ; apagar cama
    M104 S0                     ; apagar extrusor
    M106 S0                     ; apagar ventilador de capa
    M84                         ; desactivar motores
    M117 ✅ Impresión completada

[gcode_macro PRIME_NOZZLE]
description: 〰️ Línea de purga segura en el borde izquierdo
gcode:
    M117 Purgando boquilla...
    G92 E0                      ; Reset extrusor
    G90                         ; Coordenadas absolutas
    G1 Z2.0 F3000               ; Levantar para evitar roces
    G1 X2 Y20 Z0.3 F5000        ; Mover al inicio (punto seguro)
    
    G1 X2 Y200 Z0.3 E15 F1500   ; Primera línea (subiendo Y)
    G1 X2.4 Y200 Z0.3 F5000     ; Pequeño desplazamiento lateral
    G1 X2.4 Y20 Z0.3 E30 F1500  ; Segunda línea (bajando Y)
    
    G92 E0                      ; Reset extrusor final
    G1 Z2.0 F3000               ; Levantar boquilla para empezar impresión
    M117 Purga completada




[gcode_macro END_PRINT]
gcode:
    PRINT_END