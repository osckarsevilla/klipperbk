[gcode_macro MOTORS_OFF]
description: Desactiva todos los motores para mover manualmente
gcode:
    {% if printer.idle_timeout.state == "Printing" %}
        { action_respond_info("No se puede desactivar motores durante la impresión") }
    {% else %}
        M84
        { action_respond_info("Motores desactivados - puedes mover libremente") }
    {% endif %}
