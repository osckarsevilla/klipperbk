[gcode_macro PREHEAT_CUSTOM]
description: 🎛️ Precalentar personalizado | Uso: PREHEAT_CUSTOM BED=60 EXTRUDER=200
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXT_TEMP = params.EXTRUDER|default(200)|float %}
    M117 Cama:{BED_TEMP} Extrusor:{EXT_TEMP}
    M140 S{BED_TEMP}
    M104 S{EXT_TEMP}

[gcode_macro CANCEL_PREHEAT]
description: ❄️ Apagar cama y extrusor inmediatamente
gcode:
    M140 S0
    M104 S0
    M117 Calefactores apagados
