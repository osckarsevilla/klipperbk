[gcode_macro ENFRIAR_Y_AVISAR]
description: Enfría la cama a 30°C y avisa cuando la pieza está lista
gcode:
    M117 Enfriando cama...
    M140 S30            # Establece el objetivo de la cama a 30°C
    TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM=32 # Espera a que baje de 32°C
    
    # Aviso sonoro (si tu Ender 3 tiene altavoz/beeper)
    M300 S440 P200 
    M300 S660 P200
    
    M117 ¡Pieza lista! 🧊
    RESPOND MSG="La cama ha bajado de 30°C. Ya puedes retirar la pieza con facilidad."